<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambient Study Player</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<header>
  <h1>Ambient Study Player</h1>
</header>

<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Music</a></li>
    <li><a href="#">Playlists</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>

<main class="container">

  <!-- PLAYER -->
  <div class="media-player">

    <div class="track-info">Ambient Mix</div>

    <audio id="custom-audio-player" preload="metadata">
      <source src="media/ambient-audio.mp3" type="audio/mpeg">
    </audio>

    <div class="custom-controls">

      <button id="play-pause-btn">
        <img id="play-pause-img"
          src="https://img.icons8.com/ios-glyphs/30/play--v1.png">
      </button>

      <div class="progress-bar">
        <div id="progress-bar-fill"></div>
      </div>

      <button id="mute-btn">
        <img id="mute-icon"
          src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png">
      </button>

      <input id="volume-slider" type="range" min="0" max="1" step="0.01">

      <button id="loop-btn">
        <img id="loop-icon" src="assets/loop.png">
      </button>

    </div>
  </div>

  <!-- MIXER -->
  <div class="mixer">

    <div class="channel">
      <input type="range" class="fader" id="rain" min="0" max="100">
      <button class="mixer-mute" id="rain-mute">
        <img src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png">
      </button>
    </div>

    <div class="channel">
      <input type="range" class="fader" id="thunder" min="0" max="100">
      <button class="mixer-mute" id="thunder-mute">
        <img src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png">
      </button>
    </div>

    <div class="channel">
      <input type="range" class="fader" id="brown" min="0" max="100">
      <button class="mixer-mute" id="brown-mute">
        <img src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png">
      </button>
    </div>

    <div class="channel">
      <input type="range" class="fader" id="fire" min="0" max="100">
      <button class="mixer-mute" id="fire-mute">
        <img src="https://img.icons8.com/ios-glyphs/30/high-volume--v1.png">
      </button>
    </div>

  </div>

</main>

<!-- 🔥 FIXED AUDIO SOURCES -->
<audio id="rain-audio" loop>
  <source src="media/lightrain.mp3" type="audio/mpeg">
</audio>

<audio id="thunder-audio" loop>
  <source src="media/thunderstorm.mp3" type="audio/mpeg">
</audio>

<audio id="brown-audio" loop>
  <source src="media/brown-noise.mp3" type="audio/mpeg">
</audio>

<audio id="fire-audio" loop>
  <source src="media/fire.mp3" type="audio/mpeg">
</audio>

<footer>
  <p>© 2024 Media Player Website</p>
</footer>

</body>
</html>
