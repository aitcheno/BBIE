<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Media Player</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">

  <script src="script.js" defer></script>
</head>

<body>
    <h1 style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;">
      TEST VERSION 123
    </h1>
    
  <header>
    <h1>Media Player Website</h1>
  </header>

  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Videos</a></li>
      <li><a href="#">Music</a></li>
      <li><a href="#">Playlists</a></li>
    </ul>
  </nav>

  <main class="container">

    <div class="media-player">

        <audio id="custom-audio-player" preload="metadata">
            <source src="ambient-audio.mp3" type="audio/mpeg">
        </audio>

      <div class="custom-controls">

        <button id="play-pause-btn">
          <img id="play-pause-img"
               src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
               alt="Play Button"
               width="24"
               height="24">
        </button>

        <div class="progress-bar">
            <div id="progress-bar-fill"></div>
        </div>

      </div>
    </div>

  </main>

  <footer>
    <p>© 2024 Media Player Website</p>
  </footer>

</body>
</html>
