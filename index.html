<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ambient Audio Player</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">

  <script src="script.js" defer></script>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Media Player Website</h1>
  </header>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Music</a></li>
      <li><a href="#">Playlists</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">

    <!-- Audio Player -->
    <div class="media-player">

      <!-- Optional label -->
      <div class="track-info">
        Now Playing
      </div>

      <!-- AUDIO ONLY -->
      <audio id="custom-audio-player" preload="metadata">
        <source src="media\ambient-audio.mp3" type="audio/mpeg">
      </audio>

      <!-- Controls -->
      <div class="custom-controls">

        <button id="play-pause-btn">
          <img
            id="play-pause-img"
            src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
            alt="Play/Pause"
            width="24"
            height="24"
          />
        </button>

        <div class="progress-bar">
          <div id="progress-bar-fill"></div>
        </div>

      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer>
    <p>© 2024 Media Player Website</p>
  </footer>

</body>
</html>
