<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ambient Audio Player</title>

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">

  <script src="script.js" defer></script>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Media Player Website</h1>
  </header>

  <!-- NAV -->
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Music</a></li>
      <li><a href="#">Playlists</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- MAIN CONTAINER -->
  <main class="container">

    <!-- MEDIA PLAYER -->
    <div class="media-player">

      <!-- AUDIO -->
      <audio id="custom-audio-player" preload="metadata">
        <source src="media/ambient-audio.mp3" type="audio/mpeg">
      </audio>

      <!-- CONTROLS -->
      <div class="custom-controls">

        <!-- PLAY BUTTON -->
        <button id="play-pause-btn">
          <img
            id="play-pause-img"
            src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
            width="24"
            height="24"
          />
        </button>

        <!-- PROGRESS BAR -->
        <div class="progress-bar">
          <div id="progress-bar-fill"></div>
        </div>

        <!-- VOLUME OFF BUTTON -->
        <button id="mute-btn">
          <img
            id="mute-icon"
            src="https://img.icons8.com/ios/50/000000/no-audio.png"
            width="22"
            height="22"
          />
        </button>

        <!-- VOLUME SLIDER -->
        <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="1">

      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2024 Media Player Website</p>
  </footer>

</body>
</html>
